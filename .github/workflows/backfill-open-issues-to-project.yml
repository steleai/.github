# Reusable workflow that backfills open issues from selected repositories into the org project.
name: Backfill Open Issues To Org Project

on:
  workflow_call:
    inputs:
      project_number:
        description: Organization project number
        required: false
        type: number
        default: 1
      repositories:
        description: Newline-separated repository names under steleai to backfill
        required: false
        type: string
        default: |
          SprintAct
          planning_board
      status_field_name:
        description: Project single-select field used for workflow state
        required: false
        type: string
        default: Status
      status_option_name:
        description: Project status option to set on backfilled issues
        required: false
        type: string
        default: Backlog
    secrets:
      app_client_id:
        description: GitHub App client ID
        required: true
      app_private_key:
        description: GitHub App private key
        required: true

jobs:
  backfill-open-issues:
    name: Backfill open issues to steleai project
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Create GitHub App installation token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ secrets.app_client_id }}
          private-key: ${{ secrets.app_private_key }}
          owner: steleai
          repositories: ${{ inputs.repositories }}

      - name: Backfill open issues into project backlog
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          PROJECT_NUMBER: ${{ inputs.project_number }}
          REPOSITORIES: ${{ inputs.repositories }}
          STATUS_FIELD_NAME: ${{ inputs.status_field_name }}
          STATUS_OPTION_NAME: ${{ inputs.status_option_name }}
        run: |
          set -euo pipefail

          project_query="$(cat <<'GRAPHQL'
          query($login:String!, $number:Int!) {
            organization(login: $login) {
              projectV2(number: $number) {
                id
                fields(first: 100) {
                  nodes {
                    ... on ProjectV2SingleSelectField {
                      id
                      name
                      options {
                        id
                        name
                      }
                    }
                  }
                }
              }
            }
          }
          GRAPHQL
          )"

          add_item_mutation="$(cat <<'GRAPHQL'
          mutation($projectId:ID!, $contentId:ID!) {
            addProjectV2ItemById(input: { projectId: $projectId, contentId: $contentId }) {
              item {
                id
              }
            }
          }
          GRAPHQL
          )"

          update_status_mutation="$(cat <<'GRAPHQL'
          mutation($projectId:ID!, $itemId:ID!, $fieldId:ID!, $optionId:String!) {
            updateProjectV2ItemFieldValue(
              input: {
                projectId: $projectId,
                itemId: $itemId,
                fieldId: $fieldId,
                value: { singleSelectOptionId: $optionId }
              }
            ) {
              projectV2Item {
                id
              }
            }
          }
          GRAPHQL
          )"

          issues_query_first="$(cat <<'GRAPHQL'
          query($owner:String!, $repo:String!) {
            repository(owner: $owner, name: $repo) {
              issues(first: 100, states: OPEN, orderBy: { field: UPDATED_AT, direction: DESC }) {
                pageInfo {
                  hasNextPage
                  endCursor
                }
                nodes {
                  id
                  number
                  title
                  projectItems(first: 50) {
                    nodes {
                      id
                      project {
                        id
                      }
                    }
                  }
                }
              }
            }
          }
          GRAPHQL
          )"

          issues_query_after="$(cat <<'GRAPHQL'
          query($owner:String!, $repo:String!, $after:String!) {
            repository(owner: $owner, name: $repo) {
              issues(first: 100, states: OPEN, after: $after, orderBy: { field: UPDATED_AT, direction: DESC }) {
                pageInfo {
                  hasNextPage
                  endCursor
                }
                nodes {
                  id
                  number
                  title
                  projectItems(first: 50) {
                    nodes {
                      id
                      project {
                        id
                      }
                    }
                  }
                }
              }
            }
          }
          GRAPHQL
          )"

          status_field_filter="$(cat <<'JQ'
          .data.organization.projectV2.fields.nodes[]? | select(.name == $field_name) | .id
          JQ
          )"

          status_option_filter="$(cat <<'JQ'
          .data.organization.projectV2.fields.nodes[]? | select(.name == $field_name) | .options[]? | select(.name == $option_name) | .id
          JQ
          )"

          existing_item_filter="$(cat <<'JQ'
          .data.repository.issues.nodes[$i].projectItems.nodes[]? | select(.project.id == $project_id) | .id
          JQ
          )"

          project_json="$(gh api graphql \
            -f query="$project_query" \
            -f login='steleai' \
            -F number="$PROJECT_NUMBER")"

          project_id="$(jq -r '.data.organization.projectV2.id' <<<"$project_json")"
          status_field_id="$(jq -r --arg field_name "$STATUS_FIELD_NAME" "$status_field_filter" <<<"$project_json" | head -n 1)"
          status_option_id="$(jq -r --arg field_name "$STATUS_FIELD_NAME" --arg option_name "$STATUS_OPTION_NAME" "$status_option_filter" <<<"$project_json" | head -n 1)"

          if [ -z "$project_id" ] || [ "$project_id" = "null" ]; then
            echo "Unable to resolve steleai project #$PROJECT_NUMBER" >&2
            exit 1
          fi
          if [ -z "$status_field_id" ] || [ "$status_field_id" = "null" ]; then
            echo "Unable to resolve project status field '$STATUS_FIELD_NAME'" >&2
            exit 1
          fi
          if [ -z "$status_option_id" ] || [ "$status_option_id" = "null" ]; then
            echo "Unable to resolve project status option '$STATUS_OPTION_NAME'" >&2
            exit 1
          fi

          add_or_update_issue() {
            local repo_name="$1"
            local issue_number="$2"
            local issue_id="$3"
            local existing_item_id="$4"

            local item_id="$existing_item_id"
            if [ -z "$item_id" ] || [ "$item_id" = "null" ]; then
              echo "Adding steleai/$repo_name#$issue_number to project"
              add_json="$(gh api graphql \
                -f query="$add_item_mutation" \
                -f projectId="$project_id" \
                -f contentId="$issue_id")"
              item_id="$(jq -r '.data.addProjectV2ItemById.item.id' <<<"$add_json")"
            else
              echo "steleai/$repo_name#$issue_number is already in project"
            fi

            if [ -n "$item_id" ] && [ "$item_id" != "null" ]; then
              gh api graphql \
                -f query="$update_status_mutation" \
                -f projectId="$project_id" \
                -f itemId="$item_id" \
                -f fieldId="$status_field_id" \
                -f optionId="$status_option_id" >/dev/null
              echo "Set steleai/$repo_name#$issue_number status to $STATUS_OPTION_NAME"
            fi
          }

          while IFS= read -r repo_name; do
            repo_name="${repo_name//[$'\t\r\n ']/}"
            if [ -z "$repo_name" ]; then
              continue
            fi

            echo "Scanning steleai/$repo_name"
            cursor=""
            while :; do
              if [ -z "$cursor" ]; then
                issues_json="$(gh api graphql \
                  -f query="$issues_query_first" \
                  -f owner='steleai' \
                  -f repo="$repo_name")"
              else
                issues_json="$(gh api graphql \
                  -f query="$issues_query_after" \
                  -f owner='steleai' \
                  -f repo="$repo_name" \
                  -f after="$cursor")"
              fi

              count="$(jq '.data.repository.issues.nodes | length' <<<"$issues_json")"
              for i in $(seq 0 $((count - 1))); do
                issue_id="$(jq -r ".data.repository.issues.nodes[$i].id" <<<"$issues_json")"
                issue_number="$(jq -r ".data.repository.issues.nodes[$i].number" <<<"$issues_json")"
                existing_item_id="$(jq -r --arg project_id "$project_id" --argjson i "$i" "$existing_item_filter" <<<"$issues_json" | head -n 1)"
                add_or_update_issue "$repo_name" "$issue_number" "$issue_id" "$existing_item_id"
              done

              has_next="$(jq -r '.data.repository.issues.pageInfo.hasNextPage' <<<"$issues_json")"
              cursor="$(jq -r '.data.repository.issues.pageInfo.endCursor' <<<"$issues_json")"
              if [ "$has_next" != "true" ]; then
                break
              fi
            done
          done <<<"$REPOSITORIES"
