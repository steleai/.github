name: Add Opened Issue To Org Project

on:
  workflow_call:
    inputs:
      issue_node_id:
        description: Node ID of the opened issue
        required: true
        type: string
      issue_url:
        description: HTML URL of the opened issue
        required: true
        type: string
      source_repository:
        description: Source repository in owner/name format
        required: true
        type: string
      issue_number:
        description: Number of the opened issue
        required: true
        type: number
      project_number:
        description: Organization project number
        required: true
        type: number
      status_field_name:
        description: Name of the single-select project field used for workflow state
        required: false
        type: string
        default: Status
      status_option_name:
        description: Name of the project status option to apply to newly opened issues
        required: false
        type: string
        default: Backlog
    secrets:
      app_client_id:
        description: GitHub App client ID
        required: true
      app_private_key:
        description: GitHub App private key
        required: true

jobs:
  add-to-project:
    name: Add issue to steleai project
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Create GitHub App installation token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ secrets.app_client_id }}
          private-key: ${{ secrets.app_private_key }}
          owner: steleai

      - name: Resolve organization project node ID
        id: project
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set -euo pipefail

          project_id="$(gh api graphql \
            -f query='query($login:String!, $number:Int!) { organization(login: $login) { projectV2(number: $number) { id } } }' \
            -f login='steleai' \
            -F number='${{ inputs.project_number }}' \
            --jq '.data.organization.projectV2.id')"

          if [ -z "$project_id" ] || [ "$project_id" = "null" ]; then
            echo "Unable to resolve steleai project #${{ inputs.project_number }}" >&2
            exit 1
          fi

          echo "project_id=$project_id" >> "$GITHUB_OUTPUT"

      - name: Add issue item to project
        id: project-item
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set -euo pipefail

          echo "Adding issue #${{ inputs.issue_number }} from ${{ inputs.source_repository }}"
          echo "Issue URL: ${{ inputs.issue_url }}"

          output_file="$(mktemp)"
          set +e
          gh api graphql \
            -f query='mutation($projectId:ID!, $contentId:ID!) { addProjectV2ItemById(input: { projectId: $projectId, contentId: $contentId }) { item { id } } }' \
            -f projectId='${{ steps.project.outputs.project_id }}' \
            -f contentId='${{ inputs.issue_node_id }}' \
            >"$output_file" 2>&1
          status=$?
          set -e

          if [ "$status" -eq 0 ]; then
            item_id="$(jq -r '.data.addProjectV2ItemById.item.id' "$output_file")"
            if [ -z "$item_id" ] || [ "$item_id" = "null" ]; then
              echo "Unable to read created project item ID." >&2
              cat "$output_file" >&2
              exit 1
            fi
            echo "Issue added to project successfully."
            echo "item_id=$item_id" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if grep -Eiq 'already exists|already in the project|already added' "$output_file"; then
            echo "Issue is already present in the project; resolving existing project item ID."
            existing_output="$(mktemp)"
            gh api graphql \
              -f query='query($contentId:ID!) { node(id: $contentId) { ... on Issue { projectItems(first: 100) { nodes { id project { id } } } } } }' \
              -f contentId='${{ inputs.issue_node_id }}' \
              >"$existing_output"

            item_id="$(jq -r --arg project_id '${{ steps.project.outputs.project_id }}' '.data.node.projectItems.nodes[]? | select(.project.id == $project_id) | .id' "$existing_output" | head -n 1)"
            if [ -z "$item_id" ] || [ "$item_id" = "null" ]; then
              echo "Issue was reported as already present, but no matching project item ID was found." >&2
              cat "$output_file" >&2
              cat "$existing_output" >&2
              exit 1
            fi

            echo "Issue is already present in the project; treating add as success."
            echo "item_id=$item_id" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Failed to add issue to project." >&2
          cat "$output_file" >&2
          exit "$status"

      - name: Resolve Backlog status field and option
        id: backlog-status
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set -euo pipefail

          output_file="$(mktemp)"
          gh api graphql \
            -f query='query($login:String!, $number:Int!) { organization(login: $login) { projectV2(number: $number) { fields(first: 100) { nodes { ... on ProjectV2SingleSelectField { id name options { id name } } } } } } }' \
            -f login='steleai' \
            -F number='${{ inputs.project_number }}' \
            >"$output_file"

          status_field_id="$(jq -r --arg field_name '${{ inputs.status_field_name }}' '.data.organization.projectV2.fields.nodes[]? | select(.name == $field_name) | .id' "$output_file" | head -n 1)"
          status_option_id="$(jq -r --arg field_name '${{ inputs.status_field_name }}' --arg option_name '${{ inputs.status_option_name }}' '.data.organization.projectV2.fields.nodes[]? | select(.name == $field_name) | .options[]? | select(.name == $option_name) | .id' "$output_file" | head -n 1)"

          if [ -z "$status_field_id" ] || [ "$status_field_id" = "null" ]; then
            echo "Unable to find project field '${{ inputs.status_field_name }}'." >&2
            cat "$output_file" >&2
            exit 1
          fi

          if [ -z "$status_option_id" ] || [ "$status_option_id" = "null" ]; then
            echo "Unable to find option '${{ inputs.status_option_name }}' in project field '${{ inputs.status_field_name }}'." >&2
            cat "$output_file" >&2
            exit 1
          fi

          echo "status_field_id=$status_field_id" >> "$GITHUB_OUTPUT"
          echo "status_option_id=$status_option_id" >> "$GITHUB_OUTPUT"

      - name: Set project status to Backlog
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set -euo pipefail

          gh api graphql \
            -f query='mutation($projectId:ID!, $itemId:ID!, $fieldId:ID!, $optionId:String!) { updateProjectV2ItemFieldValue(input: { projectId: $projectId, itemId: $itemId, fieldId: $fieldId, value: { singleSelectOptionId: $optionId } }) { projectV2Item { id } } }' \
            -f projectId='${{ steps.project.outputs.project_id }}' \
            -f itemId='${{ steps.project-item.outputs.item_id }}' \
            -f fieldId='${{ steps.backlog-status.outputs.status_field_id }}' \
            -f optionId='${{ steps.backlog-status.outputs.status_option_id }}'

          echo "Project status set to '${{ inputs.status_option_name }}'."
